<script>
(function () {
  const grid = document.getElementById('ornekler-grid');
  let tumOrnekler = [];
  let aktifFilter = 'tumu';

  function embedUrl(canvaUrl) {
    if (!canvaUrl) return null;
    const u = canvaUrl.replace(/\?.*$/, '');
    return u.endsWith('/view') ? u + '?embed' : u + '/view?embed';
  }

  function kategoriLabel(k) {
    return { web: '🌐 Dijital Düğün Web Sitesi', video: '🎬 Animasyonlu Düğün Davetiyesi', pdf: '📄 Karekodlu Tek Sayfa Davetiye' }[k] || k;
  }

  const KAT_ICON = { web: '🌐', video: '🎬', pdf: '📄' };

  function renderKart(o) {
    const pos = o.thumbnail_position || '50% 50%';

    if (o.preview_file) {
      const extra = `role="button" tabindex="0" data-preview="${o.preview_file}" data-baslik="${o.baslik}"`;
      if (o.thumbnail) {
        const imgSrc = o.thumbnail.startsWith('http') ? o.thumbnail : '/' + o.thumbnail;
        return `<div class="ornek-kart ornek-kart-tikla" data-kategori="${o.kategori}" ${extra}>
          <img src="${imgSrc}" alt="${o.baslik}" class="ornek-thumb" style="object-position:${pos}" loading="lazy">
          <div class="ornek-overlay"><span>${o.baslik}</span></div>
        </div>`;
      }
      return `<div class="ornek-kart ornek-kart-bos ornek-kart-tikla" data-kategori="${o.kategori}" ${extra}>
        <span style="font-size:2.5rem;">${KAT_ICON[o.kategori] || '🖼️'}</span>
        <div class="ornek-overlay"><span>${o.baslik}</span></div>
      </div>`;
    }

    const href = o.canva_url || '#';
    if (o.thumbnail) {
      const imgSrc = o.thumbnail.startsWith('http') ? o.thumbnail : '/' + o.thumbnail;
      return `<a href="${href}" target="_blank" rel="noopener" class="ornek-kart" data-kategori="${o.kategori}">
        <img src="${imgSrc}" alt="${o.baslik}" class="ornek-thumb" style="object-position:${pos}" loading="lazy">
        <div class="ornek-overlay"><span>${o.baslik}</span></div>
      </a>`;
    }
    return `<a href="${href}" target="_blank" rel="noopener" class="ornek-kart ornek-kart-bos" data-kategori="${o.kategori}">
      <span style="font-size:2.5rem;">${KAT_ICON[o.kategori] || '🖼️'}</span>
      <div class="ornek-overlay"><span>${o.baslik}</span></div>
    </a>`;
  }

  function render(filter) {
    const liste = filter === 'tumu'
      ? tumOrnekler
      : tumOrnekler.filter(o => o.kategori === filter);

    if (!liste.length) {
      grid.innerHTML = '<div class="ornekler-bos">Yakında örnekler eklenecek.</div>';
      return;
    }

    const canvaOrnekler  = liste.filter(o => !o.preview_file);
    const onizleOrnekler = liste.filter(o =>  o.preview_file);

    let html = canvaOrnekler.map(renderKart).join('');

    if (onizleOrnekler.length && canvaOrnekler.length) {
      html += `<div class="ornekler-ayrac">
        <span>Canva bağlantısı açılmıyorsa aşağıdaki örnekleri doğrudan izleyebilirsiniz</span>
      </div>`;
    }

    html += onizleOrnekler.map(renderKart).join('');
    grid.innerHTML = html;
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      aktifFilter = this.dataset.filter;
      render(aktifFilter);
    });
  });

  fetch('ornekler-data.json')
    .then(r => r.json())
    .then(data => {
      tumOrnekler = data;
      render(aktifFilter);
    })
    .catch(() => {
      grid.innerHTML = '<div class="ornekler-bos">Örnekler yüklenemedi.</div>';
    });
})();

// ===== ÖNİZLEME MODAL =====
const previewModal   = document.getElementById('preview-modal');
const previewIcerik  = document.getElementById('preview-icerik');
const previewKapat   = document.getElementById('preview-kapat');

function acOnizle(btn) {
  const dosya    = btn.dataset.preview;
  const ext      = dosya.toLowerCase().split('.').pop();
  const isPdf    = ext === 'pdf';
  const isResim  = ['jpg','jpeg','png','webp'].includes(ext);
  const kapatBtn = '<button class="preview-kapat" id="preview-kapat" aria-label="Kapat">×</button>';

  if (isPdf) {
    previewIcerik.innerHTML = kapatBtn +
      '<div class="preview-pdf-wrap">' +
        '<div class="preview-pdf-overlay"></div>' +
        '<iframe src="' + dosya + '#toolbar=0&navpanes=0&scrollbar=0" oncontextmenu="return false"></iframe>' +
      '</div>';
  } else if (isResim) {
    previewIcerik.innerHTML = kapatBtn +
      '<img class="preview-resim" src="' + dosya + '" alt="" oncontextmenu="return false">';
  } else {
    previewIcerik.innerHTML = kapatBtn +
      '<video class="preview-video" controls controlsList="nodownload noremoteplayback" ' +
        'disablePictureInPicture oncontextmenu="return false" autoplay muted playsinline>' +
        '<source src="' + dosya + '">' +
      '</video>';
  }

  document.getElementById('preview-kapat').addEventListener('click', kapatOnizle);
  previewModal.classList.add('aktif');
  document.body.style.overflow = 'hidden';
}

function kapatOnizle() {
  previewModal.classList.remove('aktif');
  previewIcerik.innerHTML = '<button class="preview-kapat" id="preview-kapat" aria-label="Kapat">×</button>';
  document.getElementById('preview-kapat').addEventListener('click', kapatOnizle);
  document.body.style.overflow = '';
}

previewKapat.addEventListener('click', kapatOnizle);
previewModal.addEventListener('click', function(e) {
  if (e.target === previewModal) kapatOnizle();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') kapatOnizle();
});

// Kart açma — touchend (mobil) ve click (masaüstü) tek noktadan yönetilir.
// recentTouch flag'i ile touchend'den sonra gelen sentetik click engellenir.
var recentTouch = false;
var ornGrid = document.getElementById('ornekler-grid');

ornGrid.addEventListener('touchend', function(e) {
  var card = e.target.closest('[data-preview]');
  if (!card) return;
  e.preventDefault();
  recentTouch = true;
  setTimeout(function() { recentTouch = false; }, 600);
  acOnizle(card);
}, { passive: false });

ornGrid.addEventListener('click', function(e) {
  if (recentTouch) return;
  var card = e.target.closest('[data-preview]');
  if (card) acOnizle(card);
});
</script>
