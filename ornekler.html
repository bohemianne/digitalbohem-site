<script>
(function () {
  const grid = document.getElementById('ornekler-grid');
  let tumOrnekler = [];
  let aktifFilter = 'tumu';

  function embedUrl(canvaUrl) {
    if (!canvaUrl) return null;
    const u = canvaUrl.replace(/\?.*$/, '');
    return u.endsWith('/view') ? u + '?embed' : u + '/view?embed';
  }

  function kategoriLabel(k) {
    return { web: '🌐 Dijital Düğün Web Sitesi', video: '🎬 Animasyonlu Düğün Davetiyesi', pdf: '📄 Karekodlu Tek Sayfa Davetiye' }[k] || k;
  }

  const KAT_ICON = { web: '🌐', video: '🎬', pdf: '📄' };

  function renderKart(o) {
    const href = o.canva_url || '#';
    const pos  = o.thumbnail_position || '50% 50%';
    if (o.thumbnail) {
      const imgSrc = o.thumbnail.startsWith('http') ? o.thumbnail : '/' + o.thumbnail;
      return `<a href="${href}" target="_blank" rel="noopener" class="ornek-kart" data-kategori="${o.kategori}">
        <img src="${imgSrc}" alt="${o.baslik}" class="ornek-thumb" style="object-position:${pos}" loading="lazy">
        <div class="ornek-overlay"><span>${o.baslik}</span></div>
      </a>`;
    }
    return `<a href="${href}" target="_blank" rel="noopener" class="ornek-kart ornek-kart-bos" data-kategori="${o.kategori}">
      <span style="font-size:2.5rem;">${KAT_ICON[o.kategori] || '🖼️'}</span>
      <div class="ornek-overlay"><span>${o.baslik}</span></div>
    </a>`;
  }

  function render(filter) {
    const liste = filter === 'tumu'
      ? tumOrnekler
      : tumOrnekler.filter(o => o.kategori === filter);

    if (!liste.length) {
      grid.innerHTML = '<div class="ornekler-bos">Yakında örnekler eklenecek.</div>';
      return;
    }
    grid.innerHTML = liste.map(renderKart).join('');
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      aktifFilter = this.dataset.filter;
      render(aktifFilter);
    });
  });

  fetch('ornekler-data.json')
    .then(r => r.json())
    .then(data => {
      tumOrnekler = data;
      render(aktifFilter);
    })
    .catch(() => {
      grid.innerHTML = '<div class="ornekler-bos">Örnekler yüklenemedi.</div>';
    });
})();
</script>
