<script type="application/ld+json">

    { "@type": "ListItem", "position": 2, "name": "Davetiye Örnekleri", "item": "https://digitalbohem.com.tr/ornekler.html" }
  ]

<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/ornekler.css">
</head>
<body>

<button id="menu-toggle" class="menu-toggle">☰</button>
<nav id="mobile-menu" class="mobile-menu">
  <a href="#" class="close-menu">×</a>
  <a href="index.html">Ana Sayfa</a>
  <a href="ornekler.html">Örnekler</a>
  <a href="blog/index.html">Blog</a>

</nav>

<header class="site-header">
  <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit">Digital Bohem</a></div>
  <nav class="desktop-nav">
    <a href="index.html">Ana Sayfa</a>
    <a href="ornekler.html" class="active">Örnekler</a>
    <a href="blog/index.html">Blog</a>
    <a href="hakkimizda.html">Hakkımızda</a>
  </nav>
</header>

<section class="ornekler-hero">
  <h1>Davetiye Örnekleri</h1>
  <p>Size en uygun tarzı seçin</p>
</section>

<div class="ornekler-filters">
  <button class="filter-btn active" data-filter="tumu">Tümü</button>
  <button class="filter-btn" data-filter="web">🌐 Web Sitesi</button>
  <button class="filter-btn" data-filter="video">🎬 Video</button>
  <button class="filter-btn" data-filter="pdf">📄 PDF</button>
</div>

<main class="ornekler-grid" id="ornekler-grid">
  <div class="ornekler-loading">Yükleniyor…</div>
</main>

<section class="ornekler-cta">

  <a href="index.html#iletisim" class="btn-gold">Sipariş Ver</a>
</section>

  <p>© 2026 Digital Bohem. Tüm hakları saklıdır.</p>
  <div class="social-links">
    <a href="https://instagram.com/digital.davet" target="_blank">Instagram</a>
    <a href="blog/index.html">Blog</a>
  </div>
</footer>

<script src="assets/js/main.js"></script>
<script>
(function () {
  const grid = document.getElementById('ornekler-grid');
  let tumOrnekler = [];
  let aktifFilter = 'tumu';

  function embedUrl(canvaUrl) {
    if (!canvaUrl) return null;
    const u = canvaUrl.replace(/\?.*$/, '');
    return u.endsWith('/view') ? u + '?embed' : u + '/view?embed';
  }

  function kategoriLabel(k) {
    return { web: '🌐 Web', video: '🎬 Video', pdf: '📄 PDF' }[k] || k;
  }

  function renderKart(o) {
    const embed = embedUrl(o.canva_url);
    let preview = '';
    if (o.kategori === 'video' && o.canva_url) {
      preview = `<div class="ornek-preview ornek-video-icon">🎬</div>`;
    } else if (o.kategori === 'pdf' && o.canva_url) {
      preview = `<div class="ornek-preview ornek-pdf-icon">📄</div>`;
    } else if (embed) {
      preview = `<div class="ornek-preview ornek-iframe-wrap">
        <iframe src="${embed}" loading="lazy" allowfullscreen scrolling="no" frameborder="0"></iframe>
      </div>`;
    }

    const link = o.canva_url
      ? `<a href="${o.canva_url}" target="_blank" rel="noopener" class="ornek-link">Görüntüle →</a>`
      : '';

    return `<div class="ornek-kart" data-kategori="${o.kategori}">
      ${preview}
      <div class="ornek-bilgi">
        <span class="ornek-etiket">${kategoriLabel(o.kategori)}</span>
        <h3>${o.baslik}</h3>
        <p>${o.aciklama || ''}</p>
        ${link}
      </div>
    </div>`;
  }

  function render(filter) {
    const liste = filter === 'tumu'
      ? tumOrnekler
      : tumOrnekler.filter(o => o.kategori === filter);

    if (!liste.length) {
      grid.innerHTML = '<div class="ornekler-bos">Yakında örnekler eklenecek.</div>';
      return;
    }
    grid.innerHTML = liste.map(renderKart).join('');
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      aktifFilter = this.dataset.filter;
      render(aktifFilter);
    });
  });

  fetch('ornekler-data.json')
    .then(r => r.json())
    .then(data => {
      tumOrnekler = data;
      render(aktifFilter);
    })
    .catch(() => {
      grid.innerHTML = '<div class="ornekler-bos">Örnekler yüklenemedi.</div>';
    });
})();
</script>
</body>
</html>
