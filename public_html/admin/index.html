<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Giriş | Digital Bohem</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="admin-body">

<div class="admin-login">
  <div class="login-box">
    <h2>🔐 Admin Paneli</h2>
    <p>Digital Bohem yönetim sistemine giriş yapın</p>
    <input type="password" id="admin-pass" placeholder="Şifrenizi girin">
    <div class="error-msg" id="login-error">Hatalı şifre!</div>
    <button class="btn-gold" style="width:100%;" onclick="login()">Giriş Yap</button>
  </div>
</div>

<script>
function login() {
  const pass = document.getElementById('admin-pass').value;
  if (pass === 'digital2026') {
    localStorage.setItem('db_admin', 'true');
    window.location.href = 'panel.html';
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('admin-pass').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') login();
});
</script>

</body>
</html>
