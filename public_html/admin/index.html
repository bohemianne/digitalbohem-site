<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Giriş | Digital Bohem</title>
<link rel="stylesheet" href="../assets/css/style.css?v=3">
</head>
<body class="admin-body">

<div class="admin-login">
  <div class="login-box">
    <h2>🔐 Admin Paneli</h2>
    <p>Digital Bohem yönetim sistemine giriş yapın</p>
    <div style="position:relative;">
      <input type="password" id="admin-pass" placeholder="Şifrenizi girin" style="padding-right:2.8rem;">
      <button type="button" id="pass-toggle" onclick="togglePass()" aria-label="Şifreyi göster/gizle"
        style="position:absolute; right:0.7rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1.25rem; line-height:1; padding:0;">👁️</button>
    </div>
    <div class="error-msg" id="login-error">Hatalı şifre!</div>
    <button class="btn-gold" style="width:100%;" onclick="login()">Giriş Yap</button>
  </div>
</div>

<script>
function login() {
  const pass = document.getElementById('admin-pass').value;
  if (pass === 'digital2026') {
    localStorage.setItem('db_admin', 'true');
    window.location.href = 'panel.html';
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function togglePass() {
  const inp = document.getElementById('admin-pass');
  const btn = document.getElementById('pass-toggle');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}
document.getElementById('admin-pass').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') login();
});
</script>

</body>
</html>
