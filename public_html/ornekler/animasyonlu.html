<section class="ornekler-hero">
  <h1>Animasyonlu Davetiye Örnekleri</h1>
  <p>Video ve animasyonlarla hayat bulan davetiyeler</p>
</section>

<div class="canva-section" id="ornek-container">
  <p style="color:#9ca3af; text-align:center; padding:3rem;">Henüz örnek eklenmemiş. Admin panelinden ekleyebilirsiniz.</p>
</div>

<footer class="site-footer">
  <p>© 2026 Digital Bohem. Tüm hakları saklıdır.</p>
</footer>

<script src="../assets/js/main.js"></script>
<script>
  (function() {
    const ornekler = JSON.parse(localStorage.getItem('db_ornekler') || '[]');
    const items = ornekler.filter(o => o.kategori === 'animasyonlu');
    const container = document.getElementById('ornek-container');
    if (items.length === 0) return;
    container.innerHTML = items.map(o => {
      const isCanva = o.url.includes('canva.com/design');
      const media = isCanva
        ? `<div class="canva-embed"><iframe src="${o.url}" title="${o.baslik}" allowfullscreen loading="lazy"></iframe></div>`
        : `<div class="canva-embed"><img src="${o.url}" alt="${o.baslik}" style="width:100%; border-radius:12px; object-fit:cover;"></div>`;
      return `<h2>${o.baslik}</h2>${media}`;
    }).join('');
  })();
</script>
</body>
